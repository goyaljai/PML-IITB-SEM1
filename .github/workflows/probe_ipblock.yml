name: IP Block Probe (diagnostic)

# Temporary diagnostic: determine whether the flight-data failure from GitHub's
# runners is a hard IP/ASN block or rate-limiting. Manual trigger only.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install flights fast-flights
      - name: Probe
        env:
          PYTHONUNBUFFERED: "1"
        run: python probe_ipblock.py
