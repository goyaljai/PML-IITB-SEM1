# ──────────────────────────────────────────────────────────────────────────
# Flight scraper — production configuration.
#
# Every key below has a hard-coded fallback in scraper.config.DEFAULTS, so
# missing keys here are not fatal; only the values you want to override need
# to be set. Environment variables of the form SCRAPER_<KEY> override the
# values here (e.g. SCRAPER_DELAY_MIN_SECONDS=14).
#
# ⚠️  Do NOT put credentials in this file. The cron pipeline reads any secrets
# from $HOME/.scraper_secrets, never from the repository.
# ──────────────────────────────────────────────────────────────────────────

# ── Topology ────────────────────────────────────────────────────────────────
# 15 Indian-domestic cities → 210 directed routes.
cities:
  Mumbai: BOM
  Delhi: DEL
  Bengaluru: BLR
  Hyderabad: HYD
  Chennai: MAA
  Kolkata: CCU
  Pune: PNQ
  Ahmedabad: AMD
  Surat: STV
  Visakhapatnam: VTZ
  Jaipur: JAI
  Kochi: COK
  Chandigarh: IXC
  Indore: IDR
  Lucknow: LKO

# Booking horizons we query per route.
days_out: [1, 3, 7, 14, 30, 60]

# ── Batching ────────────────────────────────────────────────────────────────
# 3-day rotation → 70 routes per cron run. A failed run does NOT advance the
# counter, so the same batch is retried tomorrow.
batches: 3

# ── Paths (relative to donotdelete/) ────────────────────────────────────────
data_dir: data
log_dir: logs
state_dir: data
lock_file: .lock

# ── Pacing — TIME-SLICED across the day to dodge Google's per-IP rate-limit ──
# Observed 2026-06-18: dense bursts (12–20 s/call) got the VPS IP blocked after
# ~130 searches (clean start → wall of "list index out of range" errors), and
# slowing a single monolithic run did NOT help — the IP was already hot from
# repeated same-day runs. The fix is architectural: scripts/cron_slice.sh runs
# the day's 70-route batch as 8 slices, one every 3 h (see crontab). Each slice
# is only ~48 calls, then the IP rests ~2.5 h — well under the threshold.
#
# So this budget/delay is PER SLICE, not per day:
#   ~48 calls × ~30 s ≈ 24 min per slice; final slice (~84 calls) ≈ 42 min.
# A 90-min hard wall leaves generous headroom yet can't bleed into the next
# slice's 3 h window.
target_runtime_seconds: 5400          # 90 min hard wall PER SLICE
delay_min_seconds: 22
delay_max_seconds: 38
long_pause_every_routes: 8
long_pause_min_seconds: 90
long_pause_max_seconds: 180

# ── Per-call retry policy ───────────────────────────────────────────────────
max_attempts: 3
backoff_base_seconds: 2.0             # 2 → 4 → 8 ... bounded by backoff_max
backoff_max_seconds: 30.0
backoff_jitter_seconds: 1.5
api_timeout_seconds: 30

# ── Plausibility band (INR) ─────────────────────────────────────────────────
# Anything outside is a parsing artefact — dropped at validation time. These
# bounds bracket every Indian-domestic economy fare we've seen in years of
# historical data.
min_plausible_price_inr: 1000
max_plausible_price_inr: 200000

# ── Canary (startup health check) ───────────────────────────────────────────
canary_route: [BOM, DEL]
canary_days_out: 7
canary_max_wait_seconds: 900          # tolerate fresh-IP warm-up
canary_probe_interval_seconds: 30
canary_attempts: 3

# ── Post-run gate ───────────────────────────────────────────────────────────
# Fraction of (route, horizon) attempts that must return ≥ 1 priced row.
min_success_rate: 0.60
# commit_below_gate=true (default): a run below the gate still commits the valid
# rows it DID fetch (each row already passed per-row validation) and logs a
# WARNING — partial data is kept rather than discarded. Only a run that fetched
# ZERO valid rows exits code 3. Set false to restore the strict legacy behaviour
# (any below-gate run exits 3 and commits nothing). The startup canary still
# guards against a fully-broken API either way.
commit_below_gate: true

# ── Logging ─────────────────────────────────────────────────────────────────
log_level: INFO
log_retention_days: 30

# ── Search parameters ───────────────────────────────────────────────────────
cabin: economy
adults: 1
currency: INR

# ── Display timezone ─────────────────────────────────────────────────────────
# IANA zone used to stamp the human-facing date/time columns (Scrape_Timestamp,
# Booking_Day_Of_Week) and to derive the travel dates we query and record
# (Departure_Date, Day_of_Week, Is_Weekend_Departure). Set to the data's frame
# of reference so timestamps read in local time WITHOUT changing the host clock.
# Falls back to UTC if the zone can't be resolved (missing tzdata).
display_timezone: Asia/Kolkata
